# 参照 CCF GESP 官方认证知识体系（C++ 方向）+ NOI 2025 大纲重新梳理
# 每道题选 1-3 个知识点标签 + 1 个等级标签（gesp1 ~ gesp10）
# gesp1-8：GESP 认证范围；gesp9：CSP-S/提高级；gesp10：NOI 及以上

gesp1:
  # 官方：基础语法、变量、基本数据类型、顺序/循环/选择结构、基本运算、输入输出
  - 顺序结构        # 赋值、输入输出、表达式计算
  - 条件结构        # if/else、多分支判断
  - 循环结构        # for/while/do-while、break/continue
  - 数学基础         # 整除取模、四舍五入、绝对值

gesp2:
  # 官方：ASCII编码、数据类型转换、多层分支/循环嵌套、常用数学函数（max/min/sqrt/abs）
  - 循环嵌套         # 多层循环/条件嵌套结构
  - 暴力枚举         # 单/多重循环枚举，gesp1-3通用
  - 模拟             # 按流程直接模拟，gesp2-4通用
  - 数学函数         # max/min/sqrt/abs/pow 等

gesp3:
  # 官方：数据编码（原码反码补码）、进制转换、位运算、一维数组、字符串、枚举法、模拟法
  - 位运算           # 与或非异或、左移右移、子集枚举
  - 进制转换         # 二进制、八进制、十六进制
  - 一维数组        # 声明、遍历、查找、统计频次
  - 字符串           # 字符串基本操作及函数

gesp4:
  # 官方：函数、指针、值传递/引用传递、结构体、二维数组、递推、排序算法、复杂度估算
  - 函数             # 定义、调用、参数传递
  - 结构体          # struct定义、成员访问、结构体数组
  - 二维数组        # 矩阵存储、二维遍历、前缀和基础
  - 递推            # 递推公式、打表、斐波那契类
  - 排序             # 冒泡/插入/选择排序、sort函数、自定义比较
  - 算法复杂度       # 时间/空间复杂度估算

gesp5:
  # 官方：初等数论、高精度、链表、辗转相除法、素数筛、唯一分解、二分、贪心、分治、递归
  - 数论基础         # GCD/LCM、质数判定
  - 约数             # 枚举因子、约数个数、约数之和
  - 素数筛           # 埃氏筛、线性筛（欧拉筛）
  - 质因数分解       # 唯一分解定理
  - 高精度           # 数组模拟大整数加减乘除
  - 链表             # 单链表、双链表、循环链表
  - 前缀和           # 一维、二维前缀和
  - 差分             # 一维、二维差分
  - 二分             # 二分查找、二分答案
  - 三分             # 单峰函数极值
  - 贪心            # 局部最优推导全局最优、证明贪心正确性
  - 分治             # 归并排序、快速排序原理
  - 递归             # 递归与回溯
  - STL              # vector、set、map、pair 等容器

gesp6:
  # 官方：树、哈夫曼树、完全二叉树、二叉排序树、DFS、BFS、简单DP（一维/背包）、栈、队列
  - 栈              # LIFO、括号匹配、函数调用模拟
  - 队列            # FIFO、循环队列、双端队列deque
  - 树形结构         # 二叉树定义、构造、前/中/后/层序遍历
  - 哈夫曼树         # 贪心构造、最优编码、权值最小带权路径
  - DFS              # 深度优先搜索、连通块
  - BFS              # 广度优先搜索、最短步数
  - DP               # 动态规划基础、记忆化搜索
  - 线性DP           # 一维DP、LIS、LCS
  - 背包DP           # 0-1背包、完全背包、多重背包

gesp7:
  # 官方：复杂DP（二维/最值优化）、图的定义与遍历、图论基本算法、哈希表
  - 快速幂           # 快速幂、矩阵快速幂的前置、mod 幂运算
  - 哈希             # 哈希表、字符串哈希
  - 表达式求值       # 栈模拟中缀/后缀表达式求值、运算符优先级
  - 图论基础         # 图的存储、邻接表/矩阵
  - DFS进阶          # 回溯剪枝、搜索优化
  - BFS进阶          # 多源BFS、0-1 BFS、泛洪算法
  - 双指针           # 滑动窗口、相向双指针
  - 区间DP           # 区间动态规划
  - 树上DP           # 树形DP
  - 二维DP           # 二维动态规划

gesp8:
  # 官方：计数原理、排列组合、杨辉三角、倍增法、最小生成树、单源最短路径、算法优化
  - 组合数学         # 计数原理、排列组合、杨辉三角
  - 倍增             # 倍增法
  - LCA              # 最近公共祖先（倍增LCA）
  - 树的直径         # 两次DFS求直径
  - 最小生成树       # Kruskal、Prim
  - 单源最短路径     # Dijkstra、SPFA/Bellman-Ford
  - Floyd            # 全源最短路、传递闭包
  - 并查集           # 路径压缩、按秩合并
  - 优先队列         # 堆、优先队列贪心
  - 拓扑排序         # DAG排序、依赖关系
  - 树的重心         # 树的重心求法与应用
  - 树上差分         # 树上路径差分、点差分
  - 欧拉函数         # φ(n)、欧拉定理、积性函数
  - 逆元             # 费马小定理逆元、线性逆元表
  - 容斥原理         # 集合容斥、二项式反演基础
  - 离散化           # 坐标压缩
  - ST表             # 静态RMQ
  - 差分约束        # 不等式组建图、SPFA判负环求解

# ---- gesp9：CSP-S 水平（NOI 提高级高段，难度 7-8）----
# 对应 CSP-S 竞赛及 NOI 省选入门内容

gesp9:
  # --- 字符串 ---
  - KMP             # 字符串匹配、next数组、失配指针
  - Z函数            # 扩展KMP
  - 字典树           # Trie
  - AC自动机        # 多模式串匹配、Trie+KMP失配指针
  - 回文串           # Manacher、回文树

  # --- 基础算法 ---
  - 构造             # 构造题、方案构造
  - 反悔贪心        # 堆维护可撤销决策、后悔策略
  - 环               # 基环树处理
  - 扫描线           # 扫描线算法（面积/周长/矩形）
  - 搜索进阶         # 迭代加深、IDA*
  - 次短路           # 单源次短路径
  - 分层图           # 带限制的最短路（最多走k条特殊边等）
  - 数论分块         # 整除分块、∑⌊n/i⌋类题
  - BSGS             # 大步小步算法、离散对数
  - 随机化           # 随机算法、期望复杂度、随机化剪枝

  # --- 动态规划 ---
  - 状压DP          # 集合状态压缩为整数、枚举子集
  - 数位DP          # 按位枚举、限制上界不超出、前导零处理
  - 概率DP          # 转移带概率系数、期望值计算
  - 期望DP          # 期望步数/代价、逆推期望
  - 换根DP          # 两次DFS换根、全树最优根
  - 计数DP          # 方案数统计、组合意义DP
  - 单调队列优化DP  # 滑动窗口维护最值、O(n)转移
  - 斜率优化DP      # CHT凸包维护、Li Chao线段树
  - 树上背包DP       # 树形背包

  # --- 数据结构 ---
  - 单调栈          # 维护递增/递减栈、下一个更大/小元素
  - 单调队列        # 维护滑动窗口最值、双端队列实现
  - 线性基           # 异或线性基
  - 树状数组        # BIT、单点修改区间查询、差分树状数组
  - 线段树          # 区间修改区间查询、懒标记pushdown
  - 笛卡尔树         # 堆+BST性质
  - 平衡树           # Treap/Splay/AVL
  - 树链剖分        # 重链剖分、树上路径转区间、DFS序
  - 分块            # 根号分治、分块数组、块内暴力块间维护
  - 莫队             # 普通莫队、带修莫队
  - 离线算法         # 离线处理思想、时间戳排序
  - 线段树分治       # 离线删边/撤销操作，按时间分治

  # --- 图论 ---
  - 强连通分量       # Tarjan缩点
  - 双连通分量       # BCC、割点与桥
  - 欧拉路           # 欧拉回路、欧拉路径
  - 2-SAT           # 布尔条件可满足性、Tarjan缩点染色
  - 二分图           # 匈牙利算法、König定理
  - 网络流           # 最大流/最小割（Dinic）

  # --- 数学与其他 ---
  - CDQ分治         # 离线三维偏序、时间分治降维
  - 整体二分        # 多组询问同时二分、答案按区间划分
  - 博弈论           # Nim、SG函数
  - 矩阵快速幂
  - 高斯消元         # 线性方程组、矩阵求逆
  - 计算几何         # 点积叉积、凸包、旋转卡壳
  - 概率论基础       # 概率基本概念、期望、条件概率
  - 卡特兰数        # 括号序列/进出栈/BST计数等经典应用
  - Lucas定理        # C(n,k) mod p，大组合数取模
  - 扩展GCD          # 裴蜀定理、模逆元、扩展欧几里得
  - 中国剩余定理     # CRT

# ---- gesp10：NOI 水平（NOI 级及以上，难度 8-10）----
# 对应 NOI 决赛及 IOI 选拔内容

gesp10:
  # --- 字符串 ---
  - 后缀数组         # SA、LCP数组
  - 后缀自动机       # SAM
  - 广义后缀自动机   # 多串SAM、广义SAM

  # --- 动态规划 ---
  - 四边形不等式优化DP  # 决策单调性、区间DP/序列DP加速
  - WQS二分          # 凸优化/lambda优化DP

  # --- 数据结构 ---
  - 可合并堆         # 左偏树、斜堆
  - 可持久化数据结构 # 可持久化线段树（主席树）等
  - 线段树合并       # 动态开点线段树合并
  - 树套树           # 线段树套线段树、树状数组套线段树
  - KD树             # 多维空间最近邻、矩形区域查询
  - LCT              # Link-Cut Tree，动态树，支持链路切割与维护
  - 块状链表        # 分块维护序列、支持插入删除
  - 点分治          # 树上路径统计、以重心为根递归
  - 树上启发式合并   # DSU on Tree
  - 虚树

  # --- 图论 ---
  - 费用流          # 最小费用最大流、MCMF、SPFA增广

  # --- 数学 ---
  - 半平面交         # 半平面交求可行区域
  - 原根             # 原根与指数、阶
  - 狄利克雷卷积     # 积性函数、Dirichlet卷积
  - 莫比乌斯反演     # 积性函数反演
  - FFT              # 快速傅里叶变换
  - NTT              # 快速数论变换

  # --- 组合数学 ---
  - 斯特林数        # 第一类/第二类斯特林数、排列计数
  - 母函数           # 普通/指数生成函数
  - Burnside引理     # Polya定理、置换群计数
